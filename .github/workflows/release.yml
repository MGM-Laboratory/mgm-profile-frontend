name: Release image

# Builds and pushes the web image to Docker Hub on merges to main/staging.
# Tags: the branch (main -> also `latest`) and the commit SHA.
#
# Requires repo secrets DOCKERHUB_USERNAME + DOCKERHUB_TOKEN. When absent the
# job no-ops cleanly rather than failing.

on:
  push:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  image:
    name: build · push (Docker Hub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker Hub credentials
        id: guard
        run: |
          if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ] && [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker Hub secrets not set — skipping image push."
          fi

      - name: Set up Docker Buildx
        if: steps.guard.outputs.ready == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.guard.outputs.ready == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata
        if: steps.guard.outputs.ready == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}/mgm-profile-frontend
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        if: steps.guard.outputs.ready == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
