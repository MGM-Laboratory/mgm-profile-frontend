name: Staging/Development

on:
  pull_request: 
    branches: [staging]
  push:
    branches: [main]
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  image:
    name: build · push (Docker Hub)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Docker Hub credentials
        id: guard
        run: |
          if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ] && [ -n "${{ vars.DOCKERHUB_USERNAME }}" ] && [ -n "${{ vars.IMAGE_NAME }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker Hub vars/secrets not set — skipping image push."
          fi

      - name: Set up Docker Buildx
        if: steps.guard.outputs.ready == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.guard.outputs.ready == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata
        if: steps.guard.outputs.ready == 'true'
        id: meta
        run: |
          echo "ts=$(date -u +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        if: steps.guard.outputs.ready == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:staging
            ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:staging-${{ steps.meta.outputs.ts }}
            ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:staging-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
